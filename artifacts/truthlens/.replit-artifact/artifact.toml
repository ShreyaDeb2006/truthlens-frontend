kind = "web"
previewPath = "/"
title = "TruthLens — AI Detection Platform"
version = "1.0.0"
id = "artifacts/truthlens"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20750

[services.development]
run = "pnpm --filter @workspace/truthlens run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/truthlens", "run", "build" ]
publicDir = "artifacts/truthlens/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20750"
BASE_PATH = "/"
